name: Coffee Newsletter — Envio Semanal

on:
  schedule:
    - cron: "17 7 * * 1"
  workflow_dispatch:

jobs:
  send-newsletter:
    name: Run Newsletter Pipeline
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' 

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Run pipeline
        env:
          COFFEE_ENVIRONMENT: ${{ vars.COFFEE_ENVIRONMENT }}
          COFFEE_DEBUG: ${{ vars.COFFEE_DEBUG }}
          COFFEE_API_URL: ${{ vars.COFFEE_API_URL }}
          COFFEE_BASE_URL: ${{ vars.COFFEE_BASE_URL }}
          COFFEE_SECRET_KEY: ${{ secrets.COFFEE_SECRET_KEY }}
          COFFEE_DATABASE__HOST: ${{ secrets.COFFEE_DATABASE__HOST }}
          COFFEE_DATABASE__PORT: ${{ secrets.COFFEE_DATABASE__PORT }}
          COFFEE_DATABASE__USER: ${{ secrets.COFFEE_DATABASE__USER }}
          COFFEE_DATABASE__DB: ${{ secrets.COFFEE_DATABASE__DB }}
          COFFEE_DATABASE__PASSWORD: ${{ secrets.COFFEE_DATABASE__PASSWORD }}
          COFFEE_AI_PROVIDER__API_KEY: ${{ secrets.COFFEE_AI_PROVIDER__API_KEY }}
          COFFEE_RESEND_API_KEY: ${{ secrets.COFFEE_RESEND_API_KEY }}
          COFFEE_FROM_EMAIL_NEWSLETTER: ${{ secrets.COFFEE_FROM_EMAIL_NEWSLETTER }}
          COFFEE_FROM_EMAIL_WELCOME: ${{ secrets.COFFEE_FROM_EMAIL_WELCOME }}
        run: uv run python -m apps.newsletter_pipeline.main