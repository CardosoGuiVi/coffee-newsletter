name: Coffee Newsletter — Envio Semanal

on:
  schedule:
    - cron: "0 11 * * 1"
  workflow_dispatch:

jobs:
  send-newsletter:
    name: Run Newsletter Pipeline
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' 

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Run pipeline
        env:
          COFFEE_ENVIRONMENT: ${{ vars.COFFEE_ENVIRONMENT }}
          COFFEE_DEBUG: ${{ vars.COFFEE_DEBUG }}
          COFFEE_DATABASE__HOST: ${{ secrets.COFFEE_DATABASE__HOST }}
          COFFEE_DATABASE__PORT: ${{ secrets.COFFEE_DATABASE__PORT }}
          COFFEE_DATABASE__USER: ${{ secrets.COFFEE_DATABASE__USER }}
          COFFEE_DATABASE__DB: ${{ secrets.COFFEE_DATABASE__DB }}
          COFFEE_DATABASE__PASSWORD: ${{ secrets.COFFEE_DATABASE__PASSWORD }}
          COFFEE_ANTHROPIC_API_KEY: ${{ secrets.COFFEE_ANTHROPIC_API_KEY }}
          COFFEE_RESEND_API_KEY: ${{ secrets.COFFEE_RESEND_API_KEY }}
          COFFEE_FROM_EMAIL: ${{ secrets.COFFEE_FROM_EMAIL }}
        run: uv run python -m apps.newsletter_pipeline.main