repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      # Format first
      - id: ruff-format

      # Then lint and fix
      - id: ruff
        args: [--fix]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        exclude: packages/database/migrations
        additional_dependencies:
          - sqlalchemy[mypy]
          - pydantic
        args: [--explicit-package-bases]
