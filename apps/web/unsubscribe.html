<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <meta name="description" content="Cancelar inscrição na newsletter do Coado.">
  <title>Cancelar inscrição — Coado</title>

  <link rel="icon" href="/favicon/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
  <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300;1,9..144,400&family=Inter:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/styles/pages.css">
</head>

<body>

  <!-- Gotas decorativas -->
  <svg class="deco deco-1" viewBox="0 0 300 390" fill="none" aria-hidden="true">
    <path d="M150 8Q18 110 18 225Q18 370 150 385Q282 370 282 225Q282 110 150 8Z" fill="#6F3F1E" />
  </svg>
  <svg class="deco deco-2" viewBox="0 0 240 314" fill="none" aria-hidden="true">
    <path d="M120 6Q14 90 14 182Q14 298 120 310Q226 298 226 182Q226 90 120 6Z" fill="#6F3F1E" />
  </svg>

  <div class="page">

    <header class="site-header">
      <a href="/" class="logo-link" aria-label="Coado — página inicial">
        <img src="/images/logo-dark.svg" alt="Coado" class="logo-svg" />
      </a>
    </header>

    <main class="form-page" id="main">
      <p class="error-label">Newsletter</p>
      <h1 class="error-headline">Cancelar <em>inscrição</em></h1>
      <p class="error-sub">
        Informe o e-mail que recebe a newsletter e ele será removido da lista.
        Você pode voltar quando quiser.
      </p>

      <form class="subscribe-form" id="unsubscribeForm" novalidate>
        <div id="formMessage" class="form-message" role="alert" aria-live="polite"></div>
        <div class="form-row">
          <input class="form-input" type="email" id="email" name="email" placeholder="seu@email.com"
            autocomplete="email" required aria-label="Seu endereço de e-mail">
          <button class="form-btn" type="submit" id="submitBtn">
            Cancelar inscrição
          </button>
        </div>
        <p class="form-note">Sem ressentimentos. ☕</p>
      </form>
    </main>

    <footer class="site-footer">
      <nav class="footer-nav" aria-label="Links do rodapé">
        <a href="/privacy">Privacidade</a>
        <a href="/terms">Termos</a>
      </nav>
      <p class="footer-text">&copy; 2026 Coado</p>
    </footer>

  </div>
  <script src="/js/config.js"></script>
  <script src="/js/unsubscribe.js"></script>
</body>

</html>
