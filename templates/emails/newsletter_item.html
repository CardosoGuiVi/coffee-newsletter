<table width="100%" cellpadding="0" cellspacing="0" border="0"
  style="margin-bottom:1.5rem;border-left:3px solid #c87941;">
  <tr>
    <td style="padding:0.75rem 1rem;font-family:Georgia,serif;color:#2c1a0e;">
      <p style="margin:0 0 0.4rem;font-size:1rem;font-weight:bold;">{{ title }}</p>
      <p style="margin:0 0 0.6rem;font-size:0.9rem;line-height:1.6;">{{ summary }}</p>
      <p style="margin:0 0 0.5rem;font-size:0.8rem;color:#9c6644;">Fonte: {{ source }}</p>
      <a href="{{ url }}" style="color:#6f3f1e;font-size:0.85rem;">Ler matéria original →</a>
    </td>
  </tr>
</table>
